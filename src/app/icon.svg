<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Indigo background with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Icon centered (original 24×24 scaled, offset 4,4) -->
  <g transform="translate(4,4)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Router box -->
    <rect x="3" y="8" width="12" height="10" rx="2" stroke="#ffffff" stroke-width="2"/>
    <line x1="6" y1="11" x2="12" y2="11" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="6" y1="14" x2="9" y2="14" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Antennas -->
    <path d="M7 8 L5 3 M10 8 L9 2" stroke="#ffffff" stroke-width="2"/>
    <!-- WiFi arcs -->
    <path d="M13 5 Q16 2 19 5" stroke="#a5b4fc" stroke-width="1.5" opacity="0.9"/>
    <path d="M14 3 Q16 1 18 3" stroke="#a5b4fc" stroke-width="1.2" opacity="0.6"/>
    <!-- Touch lines -->
    <path d="M21 20 L24 17 M20 18 L23 15" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Touch point -->
    <circle cx="22" cy="18" r="1.5" fill="#ffffff"/>
    <circle cx="22" cy="18" r="3" stroke="#6ee7b7" stroke-width="1" opacity="0.7"/>
  </g>
</svg>
